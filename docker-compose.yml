services:
  postgres:
    image: postgres:16-alpine
    container_name: margin-chat-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${PGDATABASE:-margin_chat}
      POSTGRES_USER: ${PGUSER:-margin_chat}
      POSTGRES_PASSWORD: ${PGPASSWORD:-margin_chat}
    ports:
      - "${PGPORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
